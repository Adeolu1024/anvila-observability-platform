global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    team: anvila
    service: anvila-api

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - localhost:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: monitoring-node
    scrape_interval: 15s
    static_configs:
      - targets: ["localhost:9100"]
        labels:
          host: monitoring-server

  - job_name: app-node
    scrape_interval: 15s
    static_configs:
      - targets: ["${APP_SERVER_IP}:9100"]
        labels:
          host: anvila-app-staging
          environment: staging

  - job_name: anvila-api-staging
    scrape_interval: 15s
    scheme: https
    metrics_path: /metrics
    static_configs:
      - targets: ["api.staging.anvila.hng14.com"]
        labels:
          service: anvila-api
          environment: staging

  - job_name: blackbox-http
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - ${STAGING_URL}
          - ${PRODUCTION_URL}
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: localhost:9115

  - job_name: github-actions-dora
    scrape_interval: 60s
    static_configs:
      - targets: ["localhost:9999"]
        labels:
          service: anvila-api
          source: github-actions
