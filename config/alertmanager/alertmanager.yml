global:
  resolve_timeout: 5m
  slack_api_url: '${SLACK_WEBHOOK_URL}'

templates:
  - /etc/alertmanager/slack.tmpl

route:
  receiver: slack-devops-alerts
  group_by: ["alertname", "service", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 3h
  routes:
    - matchers:
        - severity="critical"
      receiver: slack-devops-alerts
      repeat_interval: 30m
    - matchers:
        - severity="warning"
      receiver: slack-devops-alerts
      repeat_interval: 2h

inhibit_rules:
  - source_matchers:
      - alertname="HostDown"
    target_matchers:
      - alertname=~"HighCPUWarning|HighCPUCritical|HighMemoryWarning|HighMemoryCritical|DiskUsageWarning|DiskUsageCritical"
    equal: ["instance"]

receivers:
  - name: slack-devops-alerts
    slack_configs:
      - channel: "#DevOps-Alerts"
        send_resolved: true
        title: '{{ template "slack.title" . }}'
        text: '{{ template "slack.text" . }}'
        color: '{{ if eq .Status "firing" }}{{ if eq .CommonLabels.severity "critical" }}danger{{ else }}warning{{ end }}{{ else }}good{{ end }}'

